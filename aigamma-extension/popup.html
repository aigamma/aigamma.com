<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Gamma SPX Snapshot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <span class="brand">AI GAMMA</span>
    <span id="status" class="status">...</span>
  </header>
  <main>
    <div class="row"><span class="label">SPX Reference</span><span id="spot" class="value">...</span></div>
    <div class="row"><span class="label">Dist from Risk Off</span><span id="distRiskOff" class="value">...</span></div>
    <div class="row"><span class="label">Vol Flip</span><span id="volFlip" class="value">...</span></div>
    <div class="row"><span class="label">VRP</span><span id="vrp" class="value">...</span></div>
    <div class="row"><span class="label">IV Rank</span><span id="ivRank" class="value">...</span></div>
    <div class="row"><span class="label">Put Wall</span><span id="putWall" class="value">...</span></div>
    <div class="row"><span class="label">Call Wall</span><span id="callWall" class="value">...</span></div>
    <div class="row"><span class="label">ATM IV</span><span id="atmIv" class="value">...</span></div>
    <div class="row"><span class="label">P/C Volume</span><span id="pcVol" class="value">...</span></div>
  </main>
  <footer>
    <span id="asOf" class="timestamp">...</span>
    <a href="https://aigamma.com" target="_blank" rel="noopener noreferrer">aigamma.com</a>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
