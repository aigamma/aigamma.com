<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preload" as="script" href="/vendor/plotly-cartesian-2.35.2.min.js" />
    <title>AI Gamma · Risk Lab</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot script: pre-fire /api/data so the four slots' useOptionsData
      // hooks all share a single in-flight promise via __apiBoot.today.
      (function () {
        function boot(url) {
          return fetch(url).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error('API ' + r.status + ': ' + t); });
            return r.json();
          });
        }
        var pToday = boot('/api/data?underlying=SPX&snapshot_type=intraday&v=2');
        pToday.catch(function () {});
        window.__apiBoot = { today: pToday };
      })();
    </script>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
