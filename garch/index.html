    <h1 class="visually-hidden">GARCH Ensemble</h1>
    <div id="root"></div>
    <script>
      // Boot script: GarchZoo reads SPX-history via useGexHistory, so
      // pre-fire /api/gex-history into __apiBoot.gexHistory where the
      // hook drains it via shared-fetch.
      (function () {
        function boot(url) {
          return fetch(url).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error('API ' + r.status + ': ' + t); });
            return r.json();
          });
        }
        var pGex = boot('/api/gex-history');
        pGex.catch(function () {});
        window.__apiBoot = { gexHistory: pGex };
      })();
    </script>
    <script type="module" src="./main.jsx"></script>
