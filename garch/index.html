<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preload" as="script" href="/vendor/plotly-cartesian-2.35.2.min.js" />
    <title>AI Gamma · GARCH Ensemble</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot script: GarchZoo reads SPX-history via useGexHistory, so
      // pre-fire /api/gex-history into __apiBoot.gexHistory where the
      // hook drains it via shared-fetch.
      (function () {
        function boot(url) {
          return fetch(url).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error('API ' + r.status + ': ' + t); });
            return r.json();
          });
        }
        var pGex = boot('/api/gex-history');
        pGex.catch(function () {});
        window.__apiBoot = { gexHistory: pGex };
      })();
    </script>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
