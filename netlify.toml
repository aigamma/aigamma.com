[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Netlify project "aigamma" builds production aigamma.com from this repo's
# default branch; branch deploys read the same netlify.toml. The sibling
# about.aigamma.com site is a separate Netlify project (aboutaigamma) backed
# by github.com/aigamma/about.aigamma.com instead of this repository.

# /api/heatmap reads the static options-volume roster JSON at runtime
# via readFileSync. The Netlify bundler traces ESM imports
# automatically, but raw fs reads are opaque to it — so the JSON file
# has to be opted in explicitly here or it won't ship inside the
# deployed function bundle and the function will crash at cold start
# with ENOENT. The JSON is regenerated by
# scripts/backfill/options-volume-roster.mjs from a Barchart stocks-
# screener CSV dropped at C:\sheets\ + a GICS sector lookup (GitHub
# datasets/s-and-p-500-companies CSV for SP500 names, manual override
# map in the script for non-SP500 names). See
# netlify/functions/heatmap.mjs for the full data lineage.
[functions.heatmap]
  included_files = ["src/data/options-volume-roster.json"]

# /api/scan reads the same options-volume roster JSON at runtime to
# select its top-N universe (40 by default; query-string overridable
# up to 100). Same readFileSync pattern as heatmap.mjs above, so the
# same explicit included_files entry is required to ship the JSON
# inside the deployed function bundle. See netlify/functions/scan.mjs
# for the per-ticker Massive snapshot fan-out and skew derivation.
[functions.scan]
  included_files = ["src/data/options-volume-roster.json"]

# /api/chat reads the runtime site index file at module init via
# readFileSync and injects its contents into every chat agent's
# system prompt as a [SITE INDEX] block before the per-page template.
# The index is the authoritative reference for what pages exist on
# aigamma.com, so site-level questions are answered against an
# up-to-date page list rather than against the model's training
# snapshot. Same readFileSync + ESM-import-trace gap as heatmap.mjs
# and scan.mjs above — the explicit included_files entry is what
# guarantees the file lands inside the deployed function bundle.
# Failure to read the file is non-fatal at the function level (the
# per-page prompts carry a SITE INDEX FAILSAFE summary block as the
# contingency), but the entry must be in place for the integration to
# work as designed in production. See netlify/functions/chat.mjs and
# CLAUDE.md ("Runtime Site Index" subsection) for the full wiring.
[functions.chat]
  included_files = ["src/data/site-index.txt"]

# Permanent redirect from the retired /stochastic/ lab to /jump/. The
# /stochastic/ page was deleted on 2026-05-06 after profiling showed the
# Hagan SABR card was the next bottleneck on phone-class hardware once
# the multi-model Volatility Smile had migrated off /tactical/; the smile
# was first promoted to its own /smile/ lab and SABR was dropped entirely
# because the residual it earned over the multi-model fit did not justify
# the second Plotly.newPlot mount cost. The /smile/ lab itself was then
# retired on 2026-05-08 once the /jump/ lab absorbed Heston as its first
# slot, so the canonical multi-model smile-fitting page is now /jump/.
# External bookmarks and search results that point at /stochastic/ are
# routed to /jump/ via this 301 so they continue to land on the
# conceptual successor surface rather than 404'ing. Status 301 (permanent)
# tells search engines and aggressive caches to update their indices to
# the new URL; force = true applies the rewrite even if a future build
# accidentally re-emits a /stochastic/ asset path. Keep this entry for at
# least a year before considering its removal.
[[redirects]]
  from = "/stochastic/*"
  to = "/jump/"
  status = 301
  force = true

# Permanent redirect from the retired /smile/ lab to /jump/. The /smile/
# page was deleted on 2026-05-08 after the /jump/ lab absorbed Heston as
# its new first slot, making /smile/'s three models (Heston, Merton, SVI)
# fully duplicative: Heston is now the headline model on /jump/ in its
# own dedicated card; Merton was already the second slot on /jump/ from
# the page's original four-model lineage; and SVI is covered in
# dedicated raw and natural slots on /discrete/. With every /smile/ model
# represented elsewhere on the site, the smile lab itself contributed no
# unique content and was retired to consolidate the smile-fitting
# coverage on /jump/. External bookmarks and search results that point
# at /smile/ are routed to /jump/ via this 301 so they continue to land
# on the conceptual successor surface rather than 404'ing. Status 301
# (permanent) tells search engines and aggressive caches to update
# their indices to the new URL; force = true applies the rewrite even
# if a future build accidentally re-emits a /smile/ asset path. Keep
# this entry for at least a year before considering its removal.
[[redirects]]
  from = "/smile/*"
  to = "/jump/"
  status = 301
  force = true

# Permanent redirect from the retired /parity/ lab to /. The page was
# deleted on 2026-05-07 because the put-call-parity box-spread r solver
# requires synchronous mid-of-NBBO marks, and Massive does not sell
# delayed options quotes at any tier compatible with public-website
# redistribution (Quotes-tier is live-only, regulatorily blocked for
# OPRA redistribution to non-pro subscribers on a public site).
# External bookmarks and search results land on the homepage instead
# of 404-ing, with the navigation visible so the reader can route to
# whichever current lab interests them. Status 301 (permanent) tells
# search engines and aggressive caches to update their indices to /.
# Keep this entry indefinitely; there is no successor surface.
[[redirects]]
  from = "/parity/*"
  to = "/"
  status = 301
  force = true

# Specific /api/snapshot.json redirect MUST come before the /api/* wildcard —
# otherwise the wildcard expands :splat to `snapshot.json` and Netlify looks
# for a function literally named `snapshot.json` (which doesn't exist). The
# `force = true` flag makes the rewrite apply even if a static file with
# this path is ever added under publish, belt-and-suspenders for the
# extension contract that the URL stays a function response.
[[redirects]]
  from = "/api/snapshot.json"
  to = "/.netlify/functions/snapshot"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Pretty-URL rewrite for the Chrome Web Store-required privacy policy page.
# The static file is published as dist/extension-privacy.html; this rewrite
# keeps the public URL extensionless. Netlify's implicit pretty-URL behavior
# handles this in production asset serving, but netlify dev proxies through
# Vite which treats unknown routes as SPA fallbacks (returning index.html);
# an explicit 200 rewrite normalizes behavior across local and production.
[[redirects]]
  from = "/extension-privacy"
  to = "/extension-privacy.html"
  status = 200

# Platform-level headers for the extension snapshot endpoint. Duplicates
# what snapshot.mjs sets in its Response — the function is authoritative
# on the 200 path, but having these at the edge guarantees the CORS
# header is present even if the function short-circuits before its own
# headers are written (cold-start error, import failure, etc). The
# extension has zero permissions and depends entirely on CORS for the
# cross-origin fetch to succeed.
#
# Cache profile: 60-second edge fresh window plus a 5-minute
# stale-while-revalidate tail. Aligns with the `/api/data` cache profile
# and halves the cold-edge frequency observed during latency probes
# (warm steady-state TTFB ~650 ms; cold-edge probes were measured at
# ~4.3 s, which the s-maxage=60 + SWR=300 pattern moves further into the
# tail by serving stale-on-async while a background refresh happens).
# Maximum staleness vs underlying data is bounded by the 5-minute
# intraday ingest cadence — even a fully stale-served edge response is
# at most ~60 s + 300 s = 6 minutes behind the freshest snapshot, which
# falls inside the next ingest tick anyway. Keep in sync with
# snapshot.mjs's RESPONSE_HEADERS literal.
[[headers]]
  for = "/api/snapshot.json"
  [headers.values]
    Cache-Control = "public, max-age=60, s-maxage=60, stale-while-revalidate=300"
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

# Content-hashed Vite build output lives under /assets/ with filenames
# like main-DPDCnbYA.js — the hash IS the version key, so the URL is
# immutable by construction and the bytes at that URL never change. The
# Netlify default of max-age=0, must-revalidate forces every repeat visit
# to issue a conditional request (If-None-Match → 304 Not Modified) against
# every chunk in the HTML's modulepreload manifest, which on a 4G mobile
# connection is ~50-150 ms of waterfall per chunk and ~12 round-trips on
# the main dashboard's import graph. Setting max-age=1 year + immutable
# lets the browser serve cached chunks directly without any server touch,
# removing the entire revalidation chain from the repeat-visit critical
# path. A deploy that changes chunk content generates new filenames
# automatically (content-hash rename), so stale caches can't be served
# across deploys. This header covers the JS / CSS / worker bundles Vite
# emits under /assets/.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicon PNGs are cache-busted via ?v=N query params in index.html (see
# the favicon <link> tags), so the URLs are effectively hashed by the
# query string and can also be cached long. Bumping the v param in HTML
# forces the re-fetch the next time the icon artwork changes.
[[headers]]
  for = "/favicons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# /vendor/* hosts third-party libraries that are version-pinned in their
# filenames (e.g., plotly-cartesian-2.35.2.min.js — the 2.35.2 version
# string acts as the cache key). Upgrading Plotly means shipping a new
# file with a different version in the name and updating the HTML preload
# + usePlotly.js src references; old cached copies are orphaned but
# harmless. 1-year immutable is safe because the URL itself encodes the
# version.
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Logo is not hash-named and not cache-busted, so it gets a moderate TTL
# that balances repeat-visit speed against propagation of a future logo
# update. A week (604800s) means most recurring readers avoid the re-
# fetch, and any logo swap propagates fully within that window.
[[headers]]
  for = "/logo.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"
