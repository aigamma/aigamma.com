<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preload" as="script" href="/vendor/plotly-cartesian-2.35.2.min.js" />
    <title>AI Gamma · Tactical Vol · VRP, term, smile, density, fixed-strike</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot script mirroring index.html's pattern for the two readers this
      // lab fires before the main bundle has parsed: /api/data (today's full
      // chain feeds the smile, RND, fixed-strike matrix, and the term
      // structure observed-curve trace) and /api/vrp-history (feeds the VRP
      // card). Both are consumed via the __apiBoot.today / __apiBoot.vrpHistory
      // hooks in useOptionsData and useVrpHistory respectively. Prev-day IV
      // for the FixedStrikeIvMatrix 1D-change overlay is fetched separately
      // by the matrix component itself via the thin /api/fixed-strike-iv
      // endpoint in two phases — visible expirations first, the rest on idle
      // — so the visible-immediately surfaces (smile, RND, term) are not
      // slowed by a heavy prev-day chain transit and the rangeslider has
      // tail data ready when the user drags out.
      (function () {
        function boot(url) {
          return fetch(url).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error('API ' + r.status + ': ' + t); });
            return r.json();
          });
        }
        var pToday = boot('/api/data?underlying=SPX&snapshot_type=intraday&v=2');
        var pVrp   = boot('/api/vrp-history');
        pToday.catch(function () {});
        pVrp.catch(function () {});
        window.__apiBoot = {
          today: pToday,
          vrpHistory: pVrp,
        };
      })();
    </script>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
