<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16" href="/favicons/positive/icon16.png?v=2" />
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32" href="/favicons/positive/icon32.png?v=2" />
    <link id="favicon-48" rel="icon" type="image/png" sizes="48x48" href="/favicons/positive/icon32.png?v=2" />
    <link id="favicon-128" rel="icon" type="image/png" sizes="128x128" href="/favicons/positive/icon32.png?v=2" />
    <!-- Start the cdn.plot.ly handshake during HTML parse and kick off the
         Plotly download in parallel with the React bundle. usePlotly.js
         appends a <script> with this exact URL (no crossorigin attribute =
         no-cors mode) so the preload hit is reused rather than duplicated.
         Keep the URL in sync with src/hooks/usePlotly.js. -->
    <link rel="preconnect" href="https://cdn.plot.ly" />
    <link rel="preload" as="script" href="https://cdn.plot.ly/plotly-cartesian-2.35.2.min.js" />
    <title>AI Gamma — SPX Gamma Exposure & Volatility Dashboard</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "AI Gamma",
      "url": "https://aigamma.com/",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "description": "SPX zero-DTE and monthly options gamma exposure dashboard with computed dealer positioning levels, implied volatility surfaces, and Breeden-Litzenberger risk-neutral density plots.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "publisher": {
        "@type": "Organization",
        "name": "AI Gamma",
        "url": "https://about.aigamma.com/"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
