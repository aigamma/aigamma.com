<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preload" as="script" href="/vendor/plotly-cartesian-2.35.2.min.js" />
    <title>AI Gamma · Stochastic Vol</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot script mirroring the home and /tactical/ pattern: fire the
      // /api/data fetch as soon as the HTML parser reaches this script,
      // rather than waiting for the main bundle to download, parse, React
      // to hydrate, and the four slots' useOptionsData hooks to fire. The
      // URL is byte-identical to what useOptionsData constructs on a cold
      // mount with default SPX / intraday params and v=2 matching
      // WIRE_VERSION, so the hook drains __apiBoot.today on its first read
      // and the four slots share the single in-flight promise rather than
      // four independent fetches racing each other through the CDN. On a
      // typical mid-tier laptop with a cold cache this saves ~150-300 ms of
      // network waterfall (the gap between HTML-parsed and the bundle's
      // first useEffect firing); on a phone-class viewport over 4G the win
      // is closer to ~400-700 ms because the bundle parse is the bottleneck.
      // The .catch tail silences the uncaught-promise warning between the
      // early fetch failing and the hook taking over to surface the error
      // through setError.
      (function () {
        function boot(url) {
          return fetch(url).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error('API ' + r.status + ': ' + t); });
            return r.json();
          });
        }
        var pToday = boot('/api/data?underlying=SPX&snapshot_type=intraday&v=2');
        pToday.catch(function () {});
        window.__apiBoot = {
          today: pToday,
        };
      })();
    </script>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
