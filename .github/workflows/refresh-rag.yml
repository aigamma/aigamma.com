name: Refresh RAG corpus

# Self-updating RAG layer for the aigamma.com chat domain.
#
# Re-ingests every chunked surface (per-page system prompts, global
# prompts, the about.aigamma.com index.html prose) into the shared
# Supabase rag_documents corpus that powers every chatbot on
# aigamma.com AND about.aigamma.com. Idempotent on chunk content hash:
# unchanged chunks skip the embed round-trip, only new or revised
# content pays the gte-small Supabase Edge Function call.
#
# Triggers (three, redundant by design so no single fault breaks the
# self-updating contract):
#   1. schedule: '0 */4 * * *' - every 4 hours on the top of the hour
#      (00, 04, 08, 12, 16, 20 UTC). Safety-net heartbeat that matches
#      the cadence the sibling worldthought.com workflow runs at. If
#      push/dispatch never fire, the cron still keeps the corpus
#      within 4 hours of repo state. Switched from daily to 4h on
#      2026-05-16 because (a) the cost difference is zero -- every
#      cron run that finds no hash changes does ~13 free Supabase
#      REST hash lookups and zero embedding round-trips, so a 6x
#      cron frequency costs nothing extra, and (b) a 4h max
#      staleness window is a tighter contract than 24h for the same
#      money. The fact that this matters at all assumes the
#      hash-skip mechanism in scripts/rag/ingest.mjs is actually
#      working; the run summary below now surfaces the upsert /
#      unchanged counts so any future run can be eyeballed at-a-
#      glance for cost behavior.
#   2. push: branches: [main] - every merge to main re-ingests
#      immediately, so a prompt edit lands in the chat corpus within
#      one CI run (~3-5 minutes) instead of waiting up to a day.
#   3. workflow_dispatch - manual trigger from the Actions tab for ad-
#      hoc refreshes (e.g., after an out-of-band about.aigamma.com
#      edit that did not land in aigamma.com's push trigger).
#
# Cross-repo about.aigamma.com handling: scripts/rag/ingest.mjs
# includes one source whose canonical path is
# C:\about.aigamma.com\index.html on the local machine. The walker
# was refactored to honor RAG_ABOUT_PATH (env var) before falling back
# to the local Windows path, so this workflow checks out the about
# repo to a sibling directory and points RAG_ABOUT_PATH at the
# index.html inside it. about.aigamma.com prose edits land in the
# shared corpus on the next cron tick (~24h max staleness) without
# any cross-repo dispatch wiring. For a faster turnaround, a
# maintainer can manually trigger this workflow from aigamma.com's
# Actions tab.
#
# Required GitHub repository secrets (Settings -> Secrets and
# variables -> Actions):
#   SUPABASE_URL          - https://<project-ref>.supabase.co
#   SUPABASE_SERVICE_KEY  - service-role JWT (bypasses RLS, authenticates
#                           the rag-ingest Edge Function via shared-secret).
# (Optional)
#   RAG_BATCH_SIZE        - chunks per Edge Function call. Defaults to 1
#                           here (set explicitly below) because larger
#                           batches trigger WORKER_RESOURCE_LIMIT 546 on
#                           the gte-small Supabase Edge Function. The
#                           single-chunk pace is slower (~2-5 min full
#                           pass vs ~30s) but reliable; idempotent on
#                           content_hash so re-runs of unchanged chunks
#                           cost nothing.

on:
  schedule:
    - cron: '0 */4 * * *'
  push:
    branches: [main]
  workflow_dispatch:
  # Cross-repo trigger from aigamma/about.aigamma.com so an about-page
  # push there fires this ingest within minutes instead of waiting up
  # to 24 hours for the next cron tick. The about repo's
  # trigger-rag-refresh.yml dispatches an event of this type with a
  # fine-grained PAT held as the AIGAMMA_RAG_DISPATCH_TOKEN secret on
  # the about repo. See aigamma.com/CLAUDE.md "Self-updating RAG"
  # section for the one-time PAT setup steps.
  repository_dispatch:
    types: [rag-refresh-requested]

# Avoid stacking concurrent runs when two pushes land in quick
# succession. The latest pending run wins; the in-progress run is
# allowed to finish so we never tear down a mid-pass ingest.
concurrency:
  group: refresh-rag
  cancel-in-progress: false

jobs:
  refresh:
    name: Re-ingest aigamma + about prose into Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      RAG_BATCH_SIZE: '1'
      RAG_ABOUT_PATH: ${{ github.workspace }}/about.aigamma.com/index.html

    steps:
      - name: Checkout aigamma.com (primary)
        uses: actions/checkout@v4

      - name: Checkout about.aigamma.com (for cross-repo about page prose)
        uses: actions/checkout@v4
        with:
          repository: aigamma/about.aigamma.com
          path: about.aigamma.com

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets are present
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::SUPABASE_URL secret is not set. Add it under Settings -> Secrets -> Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_KEY secret is not set. Add it under Settings -> Secrets -> Actions."
            exit 1
          fi
          if [ ! -f "$RAG_ABOUT_PATH" ]; then
            echo "::error::about.aigamma.com index.html not found at $RAG_ABOUT_PATH. The cross-repo checkout step did not produce the expected file."
            exit 1
          fi

      - name: Run RAG ingest (idempotent on chunk content hash)
        id: ingest
        run: |
          set -o pipefail
          node scripts/rag/ingest.mjs | tee ingest.log
          # Parse the final summary block the walker writes to stdout:
          #     Done. 13/13 sources processed.
          #       upserted: 0
          #       unchanged: 122
          # The "upserted" count is the number of chunks the walker actually
          # sent to the gte-small Edge Function for embedding; the "unchanged"
          # count is chunks the walker skipped because the content_hash
          # matched the existing rag_documents row. A 0/N split is the
          # all-skipped path that costs nothing beyond the per-source hash
          # lookups (13 free Supabase REST SELECTs at this volume).
          UPSERTED=$(grep -oE 'upserted:[[:space:]]*[0-9]+' ingest.log | tail -1 | grep -oE '[0-9]+' || echo "0")
          UNCHANGED=$(grep -oE 'unchanged:[[:space:]]*[0-9]+' ingest.log | tail -1 | grep -oE '[0-9]+' || echo "0")
          echo "upserted=${UPSERTED:-0}" >> "$GITHUB_OUTPUT"
          echo "unchanged=${UNCHANGED:-0}" >> "$GITHUB_OUTPUT"

      - name: Summarize run
        if: always()
        run: |
          UP="${{ steps.ingest.outputs.upserted }}"
          UNCH="${{ steps.ingest.outputs.unchanged }}"
          echo "## Refresh summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "RAG batch size: $RAG_BATCH_SIZE" >> "$GITHUB_STEP_SUMMARY"
          echo "About-page path: $RAG_ABOUT_PATH" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${UP:-0}" = "0" ]; then
            echo "**Chunks re-embedded: 0** -- no content changed since the last pass, so the gte-small Edge Function was not invoked and zero embedding round-trips were paid." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Chunks re-embedded: $UP** -- changed since the last pass; each one paid one gte-small Edge Function call." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Chunks unchanged: **$UNCH** -- the walker found a matching content_hash on the existing rag_documents row and skipped the embedding round-trip entirely." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Cost story: a pass with 0 chunks re-embedded costs nothing beyond GitHub Actions compute (~15s) plus 13 free Supabase REST hash lookups (one SELECT per source). Embedding cost is paid only for the chunks that actually changed. This is the same skip-on-hash pattern the sibling worldthought.com workflow uses against Pinecone." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Both aigamma.com and about.aigamma.com chat surfaces query the same Supabase rag_documents corpus, so this single ingest refreshes both sites." >> "$GITHUB_STEP_SUMMARY"
