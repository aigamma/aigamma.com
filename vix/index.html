  <body>
    <h1 class="visually-hidden">VIX Catalog</h1>
    <div id="root"></div>
    <script>
      // Boot script — fires the /api/vix-data fetch before the React bundle
      // parses so the network request and the JS download race in parallel
      // rather than waiting for the React mount to dispatch the fetch.
      // Mirrors the /tactical/ pattern: useVixData drains window.__vixBoot
      // when present and falls back to a fresh fetch otherwise.
      (function () {
        var p = fetch('/api/vix-data').then(function (r) {
          if (!r.ok) {
            return r.text().then(function (t) {
              throw new Error('vix-data ' + r.status + ': ' + t.slice(0, 200));
            });
          }
          return r.json();
        });
        p.catch(function () {});
        window.__vixBoot = p;
      })();
    </script>
